version: v2beta1

vars:
  APP_NAMESPACE: platform
  E2E_IMAGE: mcr.microsoft.com/playwright:v1.58.2-noble

functions:
  disable_argocd_sync: |-
    if kubectl get application tracing-app -n argocd >/dev/null 2>&1; then
      echo "Disabling ArgoCD auto-sync for tracing-app..."
      kubectl patch application tracing-app -n argocd \
        --type merge \
        -p '{"spec":{"syncPolicy":{"automated":null}}}'
      echo "ArgoCD auto-sync disabled."
    else
      echo "WARNING: ArgoCD Application 'tracing-app' not found in argocd namespace."
    fi
  restore_argocd_sync: &restore_argocd_sync |-
    if kubectl get application tracing-app -n argocd >/dev/null 2>&1; then
      echo "Re-enabling ArgoCD auto-sync for tracing-app..."
      kubectl patch application tracing-app -n argocd \
        --type merge \
        -p '{"spec":{"syncPolicy":{"automated":{"prune":true,"selfHeal":true}}}}'
      echo "ArgoCD auto-sync restored."
    else
      echo "WARNING: ArgoCD Application 'tracing-app' not found in argocd namespace."
    fi

deployments:
  e2e-runner:
    namespace: ${APP_NAMESPACE}
    helm:
      chart:
        name: component-chart
        repo: https://charts.devspace.sh
      values:
        containers:
          - image: ${E2E_IMAGE}
            env:
              - name: E2E_BASE_URL
                value: "https://tracing.agyn.dev"
        labels:
          app.kubernetes.io/name: tracing-app-e2e

commands:
  test-e2e: |-
    devspace run-pipeline test-e2e $@

pipelines:
  dev:
    flags:
      - name: watch
        short: w
        description: "Keep DevSpace running and stream logs"
    run: |-
      disable_argocd_sync
      if [ "$(get_flag "watch")" == "true" ]; then
        start_dev --disable-pod-replace tracing-app
      else
        start_dev --disable-pod-replace tracing-app
        echo "Dev environment ready. Stopping dev session."
        stop_dev tracing-app
      fi

  test-e2e:
    run: |-
      create_deployments e2e-runner
      start_dev e2e-runner &
      sleep 5
      exec_container \
        --label-selector "app.kubernetes.io/name=tracing-app-e2e" \
        -n ${APP_NAMESPACE} \
        -- bash -c '
          echo "Waiting for file sync..."
          for i in $(seq 1 60); do
            [ -f /opt/app/data/package.json ] && [ -f /opt/app/data/pnpm-lock.yaml ] && [ -f /opt/app/data/test/e2e/fixtures.ts ] && break
            sleep 2
          done
          if [ ! -f /opt/app/data/package.json ] || [ ! -f /opt/app/data/pnpm-lock.yaml ] || [ ! -f /opt/app/data/test/e2e/fixtures.ts ]; then
            echo "ERROR: file sync timed out — package.json, pnpm-lock.yaml, or test/e2e/fixtures.ts not found after 120s"
            exit 1
          fi
          cd /opt/app/data && corepack enable && pnpm install --frozen-lockfile && pnpm test:e2e
        '
      EXIT_CODE=$?
      stop_dev e2e-runner
      purge_deployments e2e-runner
      exit $EXIT_CODE

hooks:
  - name: restore-argocd-auto-sync
    events:
      - after:dev:tracing-app
    command: bash
    args:
      - -c
      - *restore_argocd_sync

dev:
  tracing-app:
    namespace: ${APP_NAMESPACE}
    labelSelector:
      app.kubernetes.io/name: tracing-app
      app.kubernetes.io/instance: tracing-app
    containers:
      tracing-app:
        sync:
          - path: ./dist:/usr/share/nginx/html
            excludePaths:
              - .git/
              - .devspace/
              - node_modules/
        logs:
          enabled: true
          lastLines: 200
    ports:
      - port: "3000"

  e2e-runner:
    namespace: ${APP_NAMESPACE}
    labelSelector:
      app.kubernetes.io/name: tracing-app-e2e
    command: ["sleep", "infinity"]
    workingDir: /opt/app/data
    sync:
      - path: ./:/opt/app/data
        excludePaths:
          - .git/
          - .devspace/
          - node_modules/
